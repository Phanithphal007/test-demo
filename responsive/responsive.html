<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .parent{
      width: 100%;
    }
    .nav{
        width: 100%;
        height: 90px;
        background-color: rgb(26, 26, 127);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0px 40px;
    }
    .logo{
        width: 100px;
        height: 100%;
    }
    .logo img{
         width: 100%;
         height: 100%;
    }
    .menu ul{
        font-size: 22px;
        color: white;
        display: flex;
        list-style: none;
        gap: 40px;
    }
    .option{
        display: none;
    }
    
    .contaner{
        width: 100%;
        justify-content: center;
        display: grid;
        grid-template-columns: repeat(5,250px);
        grid-template-rows:repeat(2,300px);
        gap: 20px;
    }
    .contaner div{
       background-color: aqua;
    }
    @media (max-width:1200px) {
       .menu ul{
         display: none;
       }
       .option{
        display: block;
       }
       .contaner{
        grid-template-columns: repeat(4,250px);
       }
    }
    
</style>
<body>
    <div class="parent">
          <div class="nav">
              <div class="logo">
                 <img src="https://i.pinimg.com/originals/a8/2e/20/a82e2018a7851ba8600bef9027f22cac.gif" alt="">
              </div>
              <div class="menu">
                <ul>
                     <li>Home</li>
                     <li>Contact</li>
                     <li>Setting</li>
                     <li>About</li>
                    
                </ul>
              </div>
               <svg class="option" style="fill:white;" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
          </div>
    </div>
    <div class="contaner">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
    </div>
</body>
</html>
