<html lang="en">

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .form-img{
        width: 1000px;
        height: 800px;
        margin: auto;
        padding: 50px;
        margin-top: 30px;
        background-image: url("https://i.pinimg.com/736x/a0/8e/05/a08e05586367f7ef2a0fe1ec464b0e56.jpg");
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
    }
    .form{
        width: 450px;
        height: 550px;        
        margin: auto;
        box-shadow: rgba(0, 0, 0, 0.3) 0px 19px 38px, rgba(0, 0, 0, 0.22) 0px 15px 12px;
        backdrop-filter: blur(9px);
        border-radius: 10px;
        padding: 30px;
    }
    .form h3{
        color: white;
    }
    .form input{
        width: 100%;
        height: 40px;
        padding: 5px 10px;
        background-color: transparent;
        outline: none;
        border: 2px solid white;
        border-radius: 5px;
        color: white;
    }
    
    ::placeholder{
        color: white;
    }
    .checkbox{
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        color: white;

    }
    .checkbox input{
        width: 25px;
       
    }
    .form button{
        width: 120px;
        height: 40px;
        margin-left: 150px;
        border-style: none;
        background-color: aquamarine;
        border-radius: 5px;
        box-shadow: rgba(0, 0, 0, 0.19) 0px 10px 20px, rgba(0, 0, 0, 0.23) 0px 6px 6px;
    }
</style>
