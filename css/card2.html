<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    .card{
        width: 400px;
        height: 600px;
        margin: auto;
        margin-top: 30px;
        padding: 20px;
        border-radius: 10px;
        box-shadow: rgba(50, 50, 93, 0.25) 0px 13px 27px -5px, rgba(0, 0, 0, 0.3) 0px 8px 16px -8px;
    }
    .cart-img{
        width: 100%;
        height: 70%;
        background-color: aqua;
        border-radius: 10px;
    }
    .cart-img img{
        width: 100%;
        height: 100%;
        border-radius: 10px;
    }
    .card p{
        font-size: 28px;
        margin-top: 10px;
    }
    .card h3{
        margin-top: 10px;
        font-size: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card button{
        width: 150px;
        height: 40px;
        margin-top: 10px;
        background-color: blue;
        color: white;
        font-size: 20px;
        border-style: none;
        border-radius: 5px;
    }
    .color{
        width: 120px;
        height:10px ;
        margin: auto;
        margin-top: 20px;
        display: flex;
        gap: 10px;
    }
    .color .color1{
        width: 10px;
        height: 100%;
        background-color: red;
        border-radius: 50%;
    }
    .color .color2{
        width: 10px;
        height: 100%;
         border-radius: 50%;
        background-color: rgb(232, 1, 182);
    }
    .color .color3{
        width: 10px;
        height: 10px;
         border-radius: 50%;
        background-color: rgb(190, 12, 249);
    }
    .color .color4{
        width: 10px;
        height: 10px;
         border-radius: 50%;
        background-color: rgb(5, 231, 43);
    }
</style>
<body>
    <div class="card">
           <div class="cart-img">
               <img  src="https://i.pinimg.com/736x/63/58/e1/6358e11ccf966d3c76324cb7eefa7ba2.jpg" alt="">
           </div>
           <p>Iphon 17 promax </p>
           <h3>Price 1200$</h3>
           <button>Add Card</button>
           <div class="color">
               <div class="color1"></div>
               <div  class="color2"></div>
               <div  class="color3"></div>
               <div  class="color4"></div>
           </div>

    </div>
</body>
</html>
