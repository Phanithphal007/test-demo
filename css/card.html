<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Bokor&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Koh+Santepheap:wght@100;300;400;700;900&family=Koulen&family=Moul&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');
    .card{
        width: 400px;
        height: 550px;
        margin: auto;
        margin-top: 50px;
        border-radius: 10px;
         box-shadow: rgba(50, 50, 93, 0.25) 0px 13px 27px -5px, rgba(0, 0, 0, 0.3) 0px 8px 16px -8px;
         padding: 20px;
         border: 2px solid black;
    }
    .card-img{
        width: 100%;
        height: 70%;
        background-color: red;
        border-radius: 10px;
    }
    .card-img img{
        width: 100%;
        border-radius: 10px;
    }
    #text{
         font-family: "Playfair Display", serif;
    }
    p{
        font-size: 23px;
        font-weight: bold;
    }
    .button{
        width: 120px;
        height: 40px;
        background-color: blue;
        color:white;
        font-size: 20px;
        border-style: none;
        border-radius: 10px;
    }
</style>
<body>
    <div class="card">
         <div class="card-img">
            <img src="iphone 17 pro max.jpg" alt="">
         </div>
         <h1 id="text">Iphone 18Pro MAX</h1>
         <p>Price :2500$</p>
         <button class="button">Add Card</button>
    </div>
</body>
</html>
